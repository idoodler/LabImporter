name: 1. Validate Secrets
run-name: Validate Secrets (${{ github.ref_name }})
on: [workflow_call, workflow_dispatch]

jobs:
  validate-access-token:
    name: Access
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
    outputs:
      HAS_WORKFLOW_PERMISSION: ${{ steps.access-token.outputs.has_workflow_permission }}
    steps:
      - name: Validate Access Token
        id: access-token
        run: |
          set -o pipefail

          GH_PAT_CLASSIC_PATTERN='^ghp_[a-zA-Z0-9]{36}$'
          GH_PAT_FINE_GRAINED_PATTERN='^github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}$'

          if [ -z "$GH_PAT" ]; then
            failed=true
            echo "::error::The GH_PAT secret is unset or empty. Set it and try again."
          else
            if [[ $GH_PAT =~ $GH_PAT_CLASSIC_PATTERN ]]; then
              provides_scopes=true
              echo "The GH_PAT secret is a structurally valid classic token."
            elif [[ $GH_PAT =~ $GH_PAT_FINE_GRAINED_PATTERN ]]; then
              echo "The GH_PAT secret is a structurally valid fine-grained token."
            else
              unknown_format=true
              echo "The GH_PAT secret does not have a known token format."
            fi

            if ! scopes=$(curl -sS -f -I -H "Authorization: token $GH_PAT" https://api.github.com | { grep -i '^x-oauth-scopes:' || true; } | cut -d ' ' -f2- | tr -d '\r'); then
              failed=true
              if [ $unknown_format ]; then
                echo "::error::Unable to connect to GitHub using the GH_PAT secret. Verify that it is set correctly (including the 'ghp_' or 'github_pat_' prefix) and try again."
              else
                echo "::error::Unable to connect to GitHub using the GH_PAT secret. Verify that the token exists and has not expired at https://github.com/settings/tokens and try again."
              fi
            elif [[ $scopes =~ workflow ]]; then
              echo "The GH_PAT secret has repo and workflow permissions."
              echo "has_workflow_permission=true" >> $GITHUB_OUTPUT
            elif [[ $scopes =~ repo ]]; then
              echo "The GH_PAT secret has repo (but not workflow) permissions."
            elif [ $provides_scopes ]; then
              failed=true
              echo "::error::The GH_PAT secret is lacking at least the 'repo' permission scope. Update the token at https://github.com/settings/tokens (repo + workflow scopes) and try again."
            else
              echo "The GH_PAT secret is valid. Assuming repo and workflow scopes are present."
              echo "has_workflow_permission=true" >> $GITHUB_OUTPUT
            fi
          fi

          if [ $failed ]; then
            exit 2
          fi

      - name: Validate Match-Secrets repository
        run: |
          set -o pipefail

          if ! visibility=$(gh repo view ${{ github.repository_owner }}/Match-Secrets --json visibility | jq --raw-output '.visibility | ascii_downcase'); then
            echo "No '${{ github.repository_owner }}/Match-Secrets' repo found. Attempting to create one..."
            if gh repo create ${{ github.repository_owner }}/Match-Secrets --private >/dev/null && \
               [ "$(gh repo view ${{ github.repository_owner }}/Match-Secrets --json visibility | jq --raw-output '.visibility | ascii_downcase')" == "private" ]; then
              echo "Created a private '${{ github.repository_owner }}/Match-Secrets' repository."
            else
              failed=true
              echo "::error::Unable to create '${{ github.repository_owner }}/Match-Secrets'. Create it manually as a private repo, then try again."
            fi
          elif [[ "$visibility" == "public" ]]; then
            failed=true
            echo "::error::The '${{ github.repository_owner }}/Match-Secrets' repository is public. Change it to private and try again."
          else
            echo "Found a private '${{ github.repository_owner }}/Match-Secrets' repository."
          fi

          if [ $failed ]; then
            exit 2
          fi

  validate-fastlane-secrets:
    name: Fastlane
    needs: [validate-access-token]
    runs-on: macos-26
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
      FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
      FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      TEAMID: ${{ secrets.TEAMID }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Install Project Dependencies
        run: bundle install

      - name: Sync clock
        run: sudo sntp -sS time.windows.com

      - name: Validate Fastlane Secrets
        run: |
          if [ -z "$TEAMID" ]; then
            failed=true
            echo "::error::The TEAMID secret is unset or empty."
          elif [ ${#TEAMID} -ne 10 ]; then
            failed=true
            echo "::error::The TEAMID secret has wrong length (expected 10 characters)."
          elif ! [[ $TEAMID =~ ^[A-Z0-9]+$ ]]; then
            failed=true
            echo "::error::The TEAMID secret is invalid (only uppercase letters and numbers)."
          fi

          if [ -z "$MATCH_PASSWORD" ]; then
            failed=true
            echo "::error::The MATCH_PASSWORD secret is unset or empty."
          fi

          set -o pipefail

          FASTLANE_KEY_ID_PATTERN='^[A-Z0-9]+$'
          FASTLANE_ISSUER_ID_PATTERN='^\{?[A-F0-9a-f]{8}-[A-F0-9a-f]{4}-[A-F0-9a-f]{4}-[A-F0-9a-f]{4}-[A-F0-9a-f]{12}\}?$'

          if [ -z "$FASTLANE_ISSUER_ID" ] || [ -z "$FASTLANE_KEY_ID" ] || [ -z "$FASTLANE_KEY" ]; then
            failed=true
            [ -z "$FASTLANE_ISSUER_ID" ] && echo "::error::The FASTLANE_ISSUER_ID secret is unset or empty."
            [ -z "$FASTLANE_KEY_ID"    ] && echo "::error::The FASTLANE_KEY_ID secret is unset or empty."
            [ -z "$FASTLANE_KEY"       ] && echo "::error::The FASTLANE_KEY secret is unset or empty."
          elif [ ${#FASTLANE_KEY_ID} -ne 10 ]; then
            failed=true
            echo "::error::The FASTLANE_KEY_ID secret has wrong length."
          elif ! [[ $FASTLANE_KEY_ID =~ $FASTLANE_KEY_ID_PATTERN ]]; then
            failed=true
            echo "::error::The FASTLANE_KEY_ID secret is invalid."
          elif ! [[ $FASTLANE_ISSUER_ID =~ $FASTLANE_ISSUER_ID_PATTERN ]]; then
            failed=true
            echo "::error::The FASTLANE_ISSUER_ID secret is invalid."
          elif ! echo "$FASTLANE_KEY" | openssl pkcs8 -nocrypt >/dev/null; then
            failed=true
            echo "::error::The FASTLANE_KEY secret is not a valid PKCS8 key."
          elif ! bundle exec fastlane validate_secrets 2>&1 | tee fastlane.log; then
            if grep -q "Couldn't decrypt the repo" fastlane.log; then
              failed=true
              echo "::error::Unable to decrypt the Match-Secrets repository using MATCH_PASSWORD."
            elif grep -q -e "required agreement" -e "license agreement" fastlane.log; then
              failed=true
              echo "::error::Accept the latest developer program license at https://developer.apple.com/account then try again."
            elif grep -q "Your certificate .* is not valid" fastlane.log; then
              echo "::notice::Distribution certificate is invalid or expired — automated renewal will be attempted."
            fi
          fi

          if [ $failed ]; then
            exit 2
          fi
