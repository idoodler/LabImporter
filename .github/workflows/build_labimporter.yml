name: 4. Build LabImporter
run-name: Build LabImporter (${{ github.ref_name }})
on:
  workflow_dispatch:
  schedule:
    # Monthly build on the first Sunday of the month at 07:00 UTC
    - cron: "0 7 * * 0"

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  check_certs:
    name: Check Certificates
    uses: ./.github/workflows/create_certs.yml
    secrets: inherit

  build:
    name: Build
    needs: [check_certs]
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Select Xcode version
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Patch Match Tables
        run: |
          TABLE_PRINTER_PATH=$(ruby -e 'puts Gem::Specification.find_by_name("fastlane").gem_dir')/match/lib/match/table_printer.rb
          if [ -f "$TABLE_PRINTER_PATH" ]; then
            sed -i "" "/puts(Terminal::Table.new(params))/d" "$TABLE_PRINTER_PATH"
          else
            echo "table_printer.rb not found"
            exit 1
          fi

      - name: Stamp Git metadata into Info.plist
        run: |
          PLIST="LabImporter/Info.plist"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          for entry in \
            "GitBranch:${{ github.ref_name }}" \
            "GitCommit:${GITHUB_SHA:0:7}" \
            "GitRepositoryURL:${REPO_URL}"; do
            key="${entry%%:*}"
            value="${entry#*:}"
            /usr/libexec/PlistBuddy -c "Set :${key} ${value}" "$PLIST" \
              || /usr/libexec/PlistBuddy -c "Add :${key} string ${value}" "$PLIST"
          done

      - name: Install Project Dependencies
        run: bundle install

      - name: Sync clock
        run: sudo sntp -sS time.windows.com

      - name: SwiftLint
        run: |
          if ! command -v swiftlint &>/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint --strict --reporter github-actions-logging

      - name: Fastlane Build & Archive
        run: bundle exec fastlane build_labimporter
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Fastlane Upload to TestFlight
        run: bundle exec fastlane release
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            artifacts
            buildlog
