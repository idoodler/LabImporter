disabled_rules:
  - trailing_comma           # cosmetic, no impact on correctness
  - comma                    # SwiftLint 0.63.2 false-positives on EOL commas in multi-line calls

opt_in_rules:
  - empty_count
  - explicit_init

analyzer_rules:
  - unused_import

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

excluded:
  - LabImporter.xcodeproj
